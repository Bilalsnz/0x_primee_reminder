<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeRemind - Multi-Alarm App</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.85);
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('Screenshot_20260415-080923~2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Status bar for notifications */
        #notifStatus {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            display: none; /* Hidden by default */
        }

        .status-warning { background: #f59e0b; color: #0f172a; font-weight: bold; }

        h1 { text-align: center; color: var(--accent); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .reminder-item {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
            backdrop-filter: blur(5px);
        }

        .time-tag { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div id="notifStatus" onclick="requestPermission()" class="status-warning">
    ⚠️ Notifications are disabled. Click here to enable.
</div>

<div class="container">
    <h1>VibeRemind</h1>
    
    <div class="input-group">
        <input type="text" id="taskName" placeholder="What's the reminder?">
        <input type="time" id="taskTime">
        <button onclick="addReminder()">Set Reminder</button>
    </div>

    <div id="reminderList"></div>
</div>

<script>
    const reminders = [];

    // Function to check and ask for permission
    function requestPermission() {
        if (!("Notification" in window)) {
            alert("This browser does not support desktop notifications.");
            return;
        }

        Notification.requestPermission().then(permission => {
            updateStatusUI();
            if (permission === "granted") {
                new Notification("VibeRemind", { body: "Notifications enabled!" });
            }
        });
    }

    function updateStatusUI() {
        const statusDiv = document.getElementById('notifStatus');
        if (Notification.permission !== "granted") {
            statusDiv.style.display = "block";
        } else {
            statusDiv.style.display = "none";
        }
    }

    // Force prompt on load
    window.onload = () => {
        updateStatusUI();
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            requestPermission();
        }
    };

    function addReminder() {
        const name = document.getElementById('taskName').value;
        const time = document.getElementById('taskTime').value;

        if (!name || !time) {
            alert("Please fill in both fields!");
            return;
        }

        // If they still haven't granted permission, ask one more time
        if (Notification.permission !== "granted") {
            requestPermission();
        }

        const reminder = { name, time, id: Date.now(), triggered: false };
        reminders.push(reminder);
        renderReminders();
        
        document.getElementById('taskName').value = '';
        document.getElementById('taskTime').value = '';
    }

    function renderReminders() {
        const list = document.getElementById('reminderList');
        list.innerHTML = '';
        reminders.sort((a, b) => a.time.localeCompare(b.time)).forEach(r => {
            const div = document.createElement('div');
            div.className = 'reminder-item';
            div.innerHTML = `
                <div>
                    <div>${r.name}</div>
                    <div class="time-tag">${r.time}</div>
                </div>
                <button style="width: auto; padding: 5px 10px; background: #ef4444; color: white;" 
                        onclick="deleteReminder(${r.id})">Cancel</button>
            `;
            list.appendChild(div);
        });
    }

    function deleteReminder(id) {
        const index = reminders.findIndex(r => r.id === id);
        if (index > -1) reminders.splice(index, 1);
        renderReminders();
    }

    setInterval(() => {
        const now = new Date();
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');

        reminders.forEach(r => {
            if (r.time === currentTime && !r.triggered) {
                r.triggered = true;
                
                if (Notification.permission === "granted") {
                    new Notification("⏰ VibeRemind", {
                        body: r.name,
                    });
                } else {
                    alert(`⏰ REMINDER: ${r.name}`);
                }
            }
        });
    }, 1000);
</script>

</body>
</html>
